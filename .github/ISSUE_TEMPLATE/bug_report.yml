name: "Bug Report"
description: "Report a bug or unexpected behavior"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      description: "A clear description of the bug."
      placeholder: "When I click 'Start Sending', nothing happens and the progress bar stays at 0%."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "How can we reproduce this?"
      placeholder: |
        1. Go to Send tab
        2. Enter emails
        3. Click 'Start'
        4. See error in console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "What should have happened instead?"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: "OS"
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"

  - type: input
    id: python
    attributes:
      label: "Python version"
      placeholder: "3.12.0"

  - type: input
    id: browser
    attributes:
      label: "Browser"
      placeholder: "Chrome 131 / Firefox 133 / Safari 18"

  - type: textarea
    id: logs
    attributes:
      label: "Error logs / screenshots"
      description: "Paste console output, Flask logs, or attach screenshots."
